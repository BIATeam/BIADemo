<bia-classic-header
  *ngIf="isTabletUiDesign !== true"
  [version]="version"
  [menus]="menus"
  [appTitle]="appTitle"
  [username]="username"
  [logos]="headerLogos"
  [supportedLangs]="supportedLangs"
  [allowThemeChange]="allowThemeChange"
  [helpUrl]="helpUrl"
  [reportUrl]="reportUrl"
  [enableNotifications]="enableNotifications"
  (language)="onLanguageChange($event)"
  (theme)="onThemeChange($event)"
></bia-classic-header>
<bia-classic-header-tablet
  *ngIf="isTabletUiDesign === true"
  [version]="version"
  [menus]="menus"
  [appTitle]="appTitle"
  [username]="username"
  [logos]="headerLogos"
  [supportedLangs]="supportedLangs"
  [allowThemeChange]="allowThemeChange"
  [helpUrl]="helpUrl"
  [reportUrl]="reportUrl"
  [enableNotifications]="enableNotifications"
  (language)="onLanguageChange($event)"
  (theme)="onThemeChange($event)"
></bia-classic-header-tablet>
<section class="content">
  <p-breadcrumb *ngIf="isTabletUiDesign !== true && (layoutService.breadcrumbHidden$ | async) === false" [model]="menuItems"></p-breadcrumb>
  <ng-content></ng-content>
</section>
<bia-classic-footer
  *ngIf="isTabletUiDesign !== true && (layoutService.footerHidden$ | async) === false"
  [companyName]="companyName"
  [logo]="footerLogo"
></bia-classic-footer>
