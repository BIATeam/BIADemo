<div fxFlex fxFill class="topbar" fxLayout="row" fxLayoutAlign="space-between center">
  <div fxFlex="1" fxFill>&nbsp;</div>
  <div fxFlex="48" fxFill>
    <div fxFill fxLayout="row" fxLayoutAlign="start center">
      <a class="project-title" routerLink="/">
        <div fxLayout="row" fxLayoutAlign="stretch center">
          <img class="app-logo" src="{{ urlAppIcon }}" />
          <span
            >{{ appTitle }}<span class="project-version">&nbsp;v{{ version }}</span></span
          >
        </div>
      </a>
    </div>
  </div>
  <div fxFlex fxFill>
    <div fxFill fxLayout="row" fxLayoutAlign="end center">
      <div fxFill fxLayout="row" fxLayoutAlign="space-evenly center">
        <ng-template ngFor let-teamTypeSelector let-first="first" [ngForOf]="teamTypeSelectors">
          <bia-classic-team-selector [teamTypeId]="teamTypeSelector"></bia-classic-team-selector>
          <span fxFlexAlign="center" class="separator"></span>
        </ng-template>
        <p-megaMenu [model]="topBarMenuItems" [ngClass]="cssClassEnv"></p-megaMenu>
        <bia-online-offline-icon></bia-online-offline-icon>
        <i
          class="pi pi-refresh app-icon-header bia-pointer"
          (click)="refresh()"
          pTooltip="{{ 'bia.refresh' | translate }}"
          tooltipPosition="bottom"
        ></i>
        <ng-container *ngIf="enableNotifications">
          <span class="notifications">
            <i
              class="pi pi-bell bia-mat-tiny-fab bia-pointer"
              pTooltip="{{ 'bia.notifications' | translate }}"
              tooltipPosition="left"
              [routerLink]="['/notifications']"
            ></i>
            <ng-container *ngIf="unreadNotificationCount$ | async as unreadNotificationCount">
              <div *ngIf="unreadNotificationCount > 0" class="notification-count">
                {{ unreadNotificationCount$ | async }}
              </div>
            </ng-container>
          </span>
        </ng-container>
        <i
          *ngIf="reportUrl"
          class="pi pi-chart-bar bia-mat-tiny-fab bia-pointer"
          pTooltip="{{ 'bia.report' | translate }}"
          tooltipPosition="left"
          (click)="openReport()"
        ></i>
        <i
          *ngIf="helpUrl"
          class="pi pi-help bia-mat-tiny-fab bia-pointer"
          pTooltip="{{ 'bia.help' | translate }}"
          (click)="openHelp()"
        ></i>
      </div>
    </div>
  </div>
  <div fxFlex="1" fxFill>&nbsp;</div>

  <div
    id="app-container-tieredMenu"
    [ngClass]="menuExpand === true ? cssClassEnv + ' app-menu-expand' : cssClassEnv + ' app-menu-collapse'"
  >
    <p-tieredMenu [model]="navMenuItems"></p-tieredMenu>
  </div>
</div>

<p-toast key="bia" #toast>
  <ng-template let-message pTemplate="message">
    <div fxLayout="column" fxFlex="100">
      <div fxLayout="row">
        <ng-container [ngSwitch]="message.severity">
          <ng-container *ngSwitchCase="'success'">
            <span
              class="ng-tns-c191-8 p-toast-message-icon pi pi-check ng-star-inserted"
              ng-reflect-ng-class="[object Object]"
            ></span>
          </ng-container>
          <ng-container *ngSwitchCase="'warn'">
            <span
              class="ng-tns-c191-8 p-toast-message-icon pi pi-exclamation-triangle ng-star-inserted"
              ng-reflect-ng-class="[object Object]"
            ></span>
          </ng-container>
          <ng-container *ngSwitchCase="'error'">
            <span
              class="ng-tns-c191-8 p-toast-message-icon pi pi-times-circle ng-star-inserted"
              ng-reflect-ng-class="[object Object]"
            ></span>
          </ng-container>
          <ng-container *ngSwitchDefault>
            <span
              class="ng-tns-c191-8 p-toast-message-icon pi pi-info-circle ng-star-inserted"
              ng-reflect-ng-class="[object Object]"
            ></span>
          </ng-container>
        </ng-container>
        <div
          class="p-toast-message-text ng-tns-c191-5 ng-star-inserted"
          (click)="message.data?.notification?.type?.id === NotificationType.Task || onNotificationClick(message)"
        >
          <div class="p-toast-summary ng-tns-c191-5">{{ message.summary }}</div>
          <div class="p-toast-detail ng-tns-c191-5">{{ message.detail }}</div>
        </div>
      </div>
      <div
        *ngIf="message.data?.notification?.type?.id === NotificationType.Task"
        class="notification-actions"
        fxLayout="row"
        fxLayoutAlign="space-between"
      >
        <button
          pButton
          [label]="message.data?.notification?.data.display | translate"
          (click)="onNotificationClick(message)"
          class="p-button-primary"
        ></button>
        <button
          pButton
          label="{{ 'bia.ignore' | translate }}"
          (click)="onIgnoreClick(message)"
          class="p-button-secondary"
        ></button>
      </div>
      <bia-notification-team-warning [notification]="message.data?.notification"></bia-notification-team-warning>
    </div>
  </ng-template>
</p-toast>
