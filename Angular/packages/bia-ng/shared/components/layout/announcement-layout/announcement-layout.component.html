@if (currentFormatedAnnouncement) {
  <div class="announcement-container">
    <div class="announcement-title">
      <span>{{ 'announcement.announcements' | translate }}</span>
      <i class="pi pi-megaphone icon-title"></i>
    </div>

    <div class="announcement-content-container">
      <div
        [class]="'announcement-content ' + getAnimationClass()"
        [innerHTML]="currentFormatedAnnouncement.html | safeHtml"></div>
    </div>
  </div>
}
